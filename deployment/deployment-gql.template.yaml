apiVersion: apps/v1
kind: Deployment
metadata:
  name: appiecal-gql
  namespace: default
  annotations:
    secrets.phase.dev/redeploy: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appiecal-gql
  template:
    metadata:
      labels:
        app: appiecal-gql
    spec:
      containers:
        - name: appiecal-gql
          image: DOCKER_IMAGE_SOURCE
          ports:
            - containerPort: 4000
          env:
            - name: BASE_API_URL
              valueFrom:
                secretKeyRef:
                  name: appiecal-gql-secrets
                  key: BASE_API_URL
